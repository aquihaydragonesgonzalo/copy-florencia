            { id: "8", title: "Tren de Regreso", startTime: "15:26", endTime: "16:48", locationName: "Florencia SMN", endLocationName: "Estación Livorno", coords: { lat: 43.776539, lng: 11.248277 }, priceEUR: 12, type: "transport", googleMapsUrl: "https://maps.app.goo.gl/xTqRT8a7fCtDDU6AA" },
            { id: "9", title: "Retorno al Barco", startTime: "17:35", endTime: "17:55", locationName: "Piazza Municipio", endLocationName: "Muelle", coords: { lat: 43.55183, lng: 10.308315 }, priceEUR: 0, type: "transport" }
        ];

        const PRONUNCIATIONS = [
            { word: 'Buongiorno', simplified: 'Bwon-yor-no', meaning: 'Buenos días' },
            { word: 'Grazie', simplified: 'Grat-sie', meaning: 'Gracias' },
            { word: 'Dov\'è il bagno?', simplified: 'Dové il baño', meaning: '¿Baño?' }
        ];

        const Timeline = ({ itinerary, onToggleComplete, onLocate, onOpenAudioGuide }) => (
            <div className="pb-24 px-4 pt-4 max-w-lg mx-auto">
                <h2 className="text-2xl font-bold text-rose-900 mb-6 uppercase">Itinerario</h2>
                <div className="relative border-l-2 border-stone-200 ml-3 space-y-8">
                    {itinerary.map((act) => (
                        <div key={act.id} className="ml-6 relative">
                            <div className={`absolute -left-[31px] top-0 rounded-full bg-white border-2 p-0.5 ${act.completed ? 'border-emerald-500 text-emerald-500' : 'border-rose-700 text-rose-700'}`} onClick={() => onToggleComplete(act.id)}>
                                {act.completed ? <Icons.CheckCircle2 size={24} /> : <Icons.Circle size={24} />}
                            </div>
                            <div className={`bg-white p-5 rounded-2xl border shadow-sm ${act.completed ? 'opacity-60' : ''}`}>
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[10px] font-bold bg-rose-100 text-rose-800 px-2 py-0.5 rounded uppercase">{act.startTime} - {act.endTime}</span>
                                    <span className="text-[10px] font-bold text-stone-400 uppercase tracking-tighter">{act.type}</span>
                                </div>
                                <h3 className="font-bold text-lg text-stone-800 mb-2">{act.title}</h3>
                                <div className="flex items-center text-sm text-stone-500 mb-4"><Icons.MapPin size={14} className="mr-1 text-rose-700"/> {act.locationName}</div>
                                <div className="flex flex-wrap gap-2 pt-3 border-t border-stone-50">
                                    <button onClick={() => onLocate(act.coords)} className="flex items-center text-[10px] font-bold text-stone-600 bg-stone-100 px-3 py-2 rounded-xl border border-stone-200"><Icons.Navigation size={12} className="mr-1.5" /> UBICACIÓN</button>
                                    {act.googleMapsUrl && <a href={act.googleMapsUrl} target="_blank" className="flex items-center text-[10px] font-bold text-stone-600 bg-white px-3 py-2 rounded-xl border border-stone-200"><Icons.ExternalLink size={12} className="mr-1.5" /> GOOGLE MAPS</a>}
                                    {act.audioGuideText && <button onClick={() => onOpenAudioGuide(act)} className="flex items-center text-[10px] font-bold text-rose-700 bg-rose-50 px-3 py-2 rounded-xl border border-rose-100"><Icons.Headphones size={12} className="mr-1.5" /> AUDIOGUÍA</button>}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const MapComponent = ({ activities, userLocation, focusedLocation }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            useEffect(() => {
                if (!mapInstance.current) {
                    mapInstance.current = L.map(mapRef.current, { zoomControl: false }).setView([43.7731, 11.2553], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapInstance.current);
                    const redIcon = L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', iconSize: [25, 41], iconAnchor: [12, 41] });
                    activities.forEach(a => L.marker([a.coords.lat, a.coords.lng], { icon: redIcon }).bindPopup(a.title).addTo(mapInstance.current));
                    L.polyline(FLORENCE_WALK_TRACK, { color: '#be123c', weight: 4, dashArray: '8, 12' }).addTo(mapInstance.current);
                }
            }, []);
            useEffect(() => { if (focusedLocation && mapInstance.current) mapInstance.current.flyTo([focusedLocation.lat, focusedLocation.lng], 16); }, [focusedLocation]);
            return <div ref={mapRef} className="w-full h-full" />;
        };

        const App = () => {
            const [itinerary, setItinerary] = useState(INITIAL_ITINERARY);
            const [activeTab, setActiveTab] = useState('timeline');
            const [mapFocus, setMapFocus] = useState(null);
            const [countdown, setCountdown] = useState('');

            useEffect(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
                const interval = setInterval(() => {
                    const diff = new Date(`2026-04-15T${SHIP_ONBOARD_TIME}:00`) - new Date();
                    if (diff <= 0) setCountdown('¡A BORDO!');
                    else {
                        const h = Math.floor(diff / 36e5), m = Math.floor((diff % 36e5) / 6e4), s = Math.floor((diff % 6e4) / 1e3);
                        setCountdown(`${h}h ${m}m ${s}s`);
                    }
                }, 1e3);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="flex flex-col h-screen bg-stone-50 overflow-hidden">
                    <header className="bg-rose-900 text-white p-4 shadow-xl z-20 flex justify-between items-center shrink-0">
                        <div className="flex items-center"><Icons.Anchor className="mr-2 text-amber-400" /> <span className="font-black text-xs uppercase tracking-widest">Escala Florencia 2026</span></div>
                        <div className="text-right"><span className="block text-[8px] uppercase text-rose-300">Embarque</span><span className="font-mono font-bold">{countdown}</span></div>
                    </header>
                    <main className="flex-1 relative overflow-hidden">
                        {activeTab === 'timeline' && <div className="h-full overflow-y-auto"><Timeline itinerary={itinerary} onToggleComplete={id => setItinerary(itinerary.map(a => a.id === id ? {...a, completed: !a.completed} : a))} onLocate={c => { setMapFocus(c); setActiveTab('map'); }} /></div>}
                        {activeTab === 'map' && <MapComponent activities={itinerary} focusedLocation={mapFocus} />}
                    </main>
                    <nav className="h-20 bg-white border-t flex justify-around items-center px-2 z-30">
                        {[{id:'timeline', icon:Icons.CalendarClock, label:'RUTA'}, {id:'map', icon:Icons.Map, label:'MAPA'}, {id:'guide', icon:Icons.BookOpen, label:'GUÍA'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center w-full ${activeTab === t.id ? 'text-rose-800' : 'text-stone-400'}`}>
                                <t.icon size={20} className={activeTab === t.id ? 'scale-110' : ''} />
                                <span className="text-[9px] font-black mt-1 uppercase tracking-widest">{t.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(e => console.error('SW Error:', e));
            });
        }
    </script>
</body>
</html>
